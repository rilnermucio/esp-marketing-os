# Clone System Manifest - Marketing OS
# Registro dos clones de experts disponíveis

version: "1.0.0"
description: "Sistema de clones de experts em marketing e copywriting"

clones:
  hormozi:
    name: "Alex Hormozi"
    specialty: "Business offers, lead generation, scaling"
    best_for: ["copy_vendas", "landing_page", "anuncio", "roteiro_video"]
    niches: ["empreendedorismo", "marketing-digital", "financas"]
    tone: "direto, números concretos, sem enrolação"
    path: "hormozi/"

  ogilvy:
    name: "David Ogilvy"
    specialty: "Brand advertising, headlines, research-driven copy"
    best_for: ["artigo_seo", "post_linkedin", "landing_page", "email"]
    niches: ["marketing-digital", "educacao", "tech"]
    tone: "elegante, research-driven, sofisticado"
    path: "ogilvy/"

  halbert:
    name: "Gary Halbert"
    specialty: "Direct response, sales letters, emotional copy"
    best_for: ["copy_vendas", "email", "newsletter", "landing_page"]
    niches: ["saude", "dev-pessoal", "financas"]
    tone: "conversacional, urgente, storytelling pessoal"
    path: "halbert/"

  schwartz:
    name: "Eugene Schwartz"
    specialty: "Market awareness, sophistication levels, breakthrough advertising"
    best_for: ["copy_vendas", "anuncio", "landing_page", "artigo_seo"]
    niches: ["marketing-digital", "empreendedorismo", "educacao"]
    tone: "analítico, preciso, científico"
    path: "schwartz/"

  brunson:
    name: "Russell Brunson"
    specialty: "Funnels, webinars, storytelling frameworks"
    best_for: ["roteiro_video", "landing_page", "copy_vendas", "anuncio"]
    niches: ["empreendedorismo", "marketing-digital", "dev-pessoal"]
    tone: "energético, storytelling, frameworks visuais"
    path: "brunson/"

  miller:
    name: "Donald Miller"
    specialty: "Storytelling para negócios, StoryBrand framework"
    best_for: ["brand_story", "landing_page", "pitch", "apresentacao"]
    niches: ["todos"]
    tone: "claro, estruturado, narrativo, centrado no cliente como herói"
    path: "miller/"

  howell:
    name: "Park Howell"
    specialty: "Business storytelling, ABT framework (And/But/Therefore)"
    best_for: ["pitch", "apresentacao", "brand_story", "social_media"]
    niches: ["todos"]
    tone: "simples, conversacional, focado em contraste e resolução"
    path: "howell/"

  mrbeast:
    name: "MrBeast (Jimmy Donaldson)"
    specialty: "Conteúdo viral de vídeo, retenção extrema, thumbnails"
    best_for: ["youtube", "reels", "tiktok", "thumbnails"]
    niches: ["entretenimento", "educacao", "desafios"]
    tone: "energético, épico, superlativo, challenge-driven"
    path: "mrbeast/"

  abdaal:
    name: "Ali Abdaal"
    specialty: "Conteúdo educativo em vídeo, produtividade, lifestyle"
    best_for: ["youtube", "podcast", "curso", "newsletter"]
    niches: ["produtividade", "educacao", "tech", "saude"]
    tone: "calmo, inteligente, evidence-based, acessível"
    path: "abdaal/"

  ellis:
    name: "Sean Ellis"
    specialty: "Growth hacking, experimentação rápida, product-market fit"
    best_for: ["growth", "onboarding", "ativacao", "retencao"]
    niches: ["saas", "tech", "startups"]
    tone: "data-driven, experimental, pragmático, focado em métricas"
    path: "ellis/"

  chen:
    name: "Andrew Chen"
    specialty: "Network effects, viral loops, marketplace growth"
    best_for: ["growth", "estrategia", "newsletter", "artigo_seo"]
    niches: ["tech", "saas", "marketplace", "startups"]
    tone: "analítico, ensaístico, baseado em cases, reflexivo"
    path: "chen/"

