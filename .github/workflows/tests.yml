name: Testes Automatizados

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rodar Testes Python
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar testes com cobertura
        run: |
          python -m pytest scripts/tests/ -v --tb=short \
            -m "not smoke" \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload relatório de cobertura
        uses: codecov/codecov-action@v6
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Verificar qualidade do código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar ferramentas de lint
        run: |
          python -m pip install --upgrade pip
          pip install "black==26.5.1" flake8

      - name: Verificar formatação com Black
        run: black --check --diff scripts/*.py scripts/hooks/

      - name: Verificar estilo com Flake8
        run: flake8 scripts/

  validate-agents:
    name: Validar native subagents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Rodar validate_agents.py (modo strict)
        run: python scripts/validate_agents.py --strict

  validate-codex-plugin:
    name: Validar pacote Codex
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Verificar pacote Codex gerado
        run: python scripts/build_codex_plugin.py --check

      - name: Validar manifesto Codex
        run: python scripts/validate_codex_plugin.py plugins/marketing-os

  validate-yaml:
    name: Validar arquivos YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Validar YAMLs do projeto
        run: |
          python -c "
          import yaml, os, sys

          erros = []
          for root, dirs, files in os.walk('.'):
              # Ignorar node_modules e .git
              dirs[:] = [d for d in dirs if d not in ['node_modules', '.git', '.aios']]
              for f in files:
                  if f.endswith('.yaml') or f.endswith('.yml'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fp:
                              yaml.safe_load(fp)
                      except yaml.YAMLError as e:
                          erros.append(f'{path}: {e}')

          if erros:
              for e in erros:
                  print(f'ERRO: {e}')
              sys.exit(1)
          else:
              print('Todos os arquivos YAML são válidos.')
          "
